<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品登録</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{common/header :: header}"></div>

<div class="layout">
    <!-- サイドバー -->
    <div th:replace="~{common/sidebar :: sidebar}"></div>

    <!-- メイン表示 -->
    <main class="content">

        <h2 class="mb-4">商品登録</h2>
        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>
        <form th:action="@{/products/form}" method="post">

            <!-- 商品名 -->
            <div class="row mb-3 align-items-center">
                <label for="name" class="col-sm-2 col-form-label">商品名</label>
                <div class="col-sm-6">
                    <input type="text" id="name" name="name" class="form-control" required>
                </div>
            </div>

            <!-- 価格 -->
            <div class="row mb-3 align-items-center">
                <label for="name" class="col-sm-2 col-form-label">価格</label>
                <div class="col-sm-6">
                    <input type="number" name="price" class="form-control" required>
                </div>
            </div>

            <!-- ジャンル -->
            <div class="row mb-3 align-items-center">
                <label for="name" class="col-sm-2 col-form-label">ジャンル</label>
                <div class="col-sm-6">
                    <select name="genre" class="form-select">
                        <option value="牛肉">牛肉</option>
                        <option value="豚肉">豚肉</option>
                        <option value="羊肉">羊肉</option>
                        <option value="鶏肉">鶏肉</option>
                        <option value="その他獣肉">その他獣肉</option>
                        <option value="魚介">魚介</option>
                        <option value="野菜">野菜</option>
                        <option value="穀物">穀物</option>
                        <option value="その他食材">その他食材</option>
                    </select>
                </div>
            </div>

            <!-- 辛さ -->
            <div class="row mb-3 align-items-center">
                <label for="name" class="col-sm-2 col-form-label">辛さ</label>
                <div class="col-sm-6">
                    <select name="spiciness" class="form-select">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">登録</button>
            <button type="reset" class="btn btn-warning ms-2">クリア</button>
            <a href="/Top" class="btn btn-secondary">戻る</a>

        </form>

    </main>
</div>
</body>
</html>
