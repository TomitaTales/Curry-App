<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<div th:replace="~{common/header :: header}" class="app-header"></div>

<div class="layout">
    <!-- サイドバー -->
    <div th:replace="~{common/sidebar :: sidebar}" class="app-sidebar"></div>

    <!-- メイン表示 -->
    <main class="app-main">
        
        <h2 class="mb-4">商品一覧</h2>

        <div class="table-responsive">
            <table class="table table-bordered table-striped table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>商品名</th>
                        <th>価格</th>
                        <th>ジャンル</th>
                        <th>辛さ</th>
                        <!-- <th>販売状態</th> -->
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="menu : ${menuList}">
                        <td th:text="${menu.id}"></td>
                        <td th:text="${menu.name}"></td>
                        <td class="text-end" th:text="${menu.price} + '円'"></td>
                        <td th:text="${menu.genre}"></td>
                        <td th:text="${menu.spiciness} + ' / 5'"></td>
                        <!-- <td>
                            <span th:if="${menu.isActive}" class="badge bg-success">販売中</span>
                            <span th:unless="${menu.isActive}" class="badge bg-secondary">停止中</span>
                        </td> -->
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>    
</body>
</html>
